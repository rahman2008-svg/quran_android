version: 2
workflows:
  quran-android-workflow:
    name: Quran Android - Madani Build
    max_build_duration: 75
    instance_type: mac_mini_m2

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Make Gradle executable
        script: chmod +x gradlew

      - name: Prepare local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Clean Project
        script: ./gradlew clean --quiet

      - name: Build Madani Debug APK
        script: ./gradlew assembleMadaniDebug --stacktrace

    artifacts:
      - "**/build/outputs/**/*.apk"
      - "**/build/outputs/**/*.aab"

    publishing:
      email:
        recipients:
          - আপনারইমেইল@gmail.com
        notify:
          success: true
          failure: true
