version: 2
workflows:
  quran-android-workflow:
    name: Quran Android Build
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      vars:
        TERMUX_PACKAGE_VARIANT: "apt-android-7"   # যদি দরকার হয়, নাহলে সরিয়ে দিতে পারেন
      java: 17
      # android_signing:          # যদি keystore আপলোড করে থাকেন তাহলে এটি যোগ করবেন
      #   - your_keystore_reference_name

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Make Gradle executable
        script: chmod +x gradlew

      - name: Prepare local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Debug APK
        script: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        script: ./gradlew assembleRelease --stacktrace

    artifacts:
      - "**/build/outputs/**/*.apk"
      - "**/build/outputs/**/*.aab"
      - "**/build/outputs/mapping/**/mapping.txt"

    publishing:
      email:
        recipients:
          - your.email@example.com
        notify:
          success: true
          failure: true
