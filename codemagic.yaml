version: 2
workflows:
  quran-android-workflow:
    name: Quran Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        TERMUX_PACKAGE_VARIANT: "apt-android-7"   # অপ্রয়োজনীয় হলে সরিয়ে দিতে পারেন
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Make Gradle executable
        script: chmod +x gradlew

      - name: Prepare local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Madani Debug APK
        script: ./gradlew assembleMadaniDebug --stacktrace

      - name: Build Madani Release APK
        script: ./gradlew assembleMadaniRelease --stacktrace

    artifacts:
      - "**/build/outputs/**/*.apk"
      - "**/build/outputs/**/*.aab"
      - "**/build/outputs/mapping/**/mapping.txt"

    publishing:
      email:
        recipients:
          - your.email@example.com
        notify:
          success: true
          failure: true
